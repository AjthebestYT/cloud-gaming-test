<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 1. BRANDING -->
  <title>ADAN BYPASS | Cloud Gaming</title>
  
  <!-- Core Libraries from Sources -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@0.26.0/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.all.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    :root { --bg-main: #1c1c1d; --primary: #8b5cf6; }
    body { background: #000; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
    [v-cloak] { display: none; }
    
    /* Layout Structure [1] */
    .layout-wrapper { display: flex; width: 100vw; height: 100vh; background: var(--bg-main); position: fixed; top: 0; left: 0; }
    .sidebar-left { width: 380px; flex-shrink: 0; background: #0b0b0b; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; height: 100vh; }
    .main-right { flex: 1; background: #19191a; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    /* Forced Horizontal Rotation [2, 3] */
    .rotate { transform: rotate(90deg); transform-origin: center; width: 100vh !important; height: 100vw !important; }
    video, canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    
    /* Game Item Styling with Images [4, 5] */
    .game-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .game-item { display: flex; gap: 1rem; padding: 0.5rem; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .game-item:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); }
    .game-item img { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; background: #222; }
    
    /* Login Modal Styles [4, 6] */
    .login-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: flex; items-center; justify-content: center; }
    .login-card { background: #0b0b0b; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
    .login-input { background: #1c1c1d; border: 1px solid rgba(255,255,255,0.1); color: white; width: 100%; padding: 12px 20px; border-radius: 16px; outline: none; margin-bottom: 1rem; }
    .login-input:focus { border-color: #8b5cf6; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <div class="sidebar-left">
        <div class="p-6 border-b border-white/5">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2 font-black text-2xl tracking-tighter">
              <span class="text-white">ADAN</span>
              <span class="text-[#8b5cf6]"> BYPASS</span>
            </div>
            <button v-if="!token" @click="showLogin = true" class="px-4 py-1.5 bg-[#8b5cf6] rounded-lg text-xs font-bold shadow-lg">Sign In</button>
            <button v-else @click="signOut()" class="p-2 bg-red-500/10 text-red-500 rounded-lg"><i data-lucide="power" class="w-4 h-4"></i></button>
          </div>
        </div>
        
        <!-- Game List Area [5] -->
        <div v-show="!selectedGame" class="flex flex-col h-full overflow-hidden">
          <div class="p-4"><input type="text" v-model="searchQuery" placeholder="Search Cloud Games..." class="w-full bg-[#1c1c1d] border border-white/10 rounded-xl px-4 py-2 text-sm"></div>
          <div class="game-list">
            <div v-for="g in filteredGames" :key="g.id" class="game-item" @click="selectGame(g)">
              <img :src="g.icon" onerror="this.src='https://cloudmoonapp.com/favicon.ico'">
              <div class="flex flex-col justify-center">
                <h3 class="font-bold text-sm text-white">{{g.title}}</h3>
                <span class="text-[10px] text-gray-500 uppercase font-black">{{g.categories.join(' / ')}}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Start Game View [7, 8] -->
        <div v-show="selectedGame" class="p-8 flex flex-col h-full">
           <button @click="selectedGame = null" class="mb-6 flex items-center gap-2 text-gray-400">← Back</button>
           <img :src="selectedGame ? selectedGame.icon : ''" class="w-full aspect-video object-cover rounded-2xl mb-6 shadow-2xl">
           <h2 class="text-3xl font-black mb-4">{{selectedGame ? selectedGame.title : ''}}</h2>
           <button v-if="!isPlaying" @click="startGameInAio" class="w-full py-4 bg-[#8b5cf6] rounded-2xl font-black text-lg">START GAME</button>
           <button v-else @click="isPlaying = false" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-bold">EXIT GAME</button>
        </div>
      </div>

      <!-- MAIN PLAYER -->
      <div class="main-right">
        <div v-show="!isPlaying" class="text-white/10 font-black text-6xl tracking-tighter italic">ADAN BYPASS</div>
        <div v-show="isPlaying" class="w-full h-full relative bg-black flex items-center justify-center">
          <!-- Horizontal Classes Applied [2, 9] -->
          <video ref="remoteVideo" :class="{rotate: isRotate}" autoplay muted playsinline></video>
          <canvas ref="remoteCanvas" :class="{rotate: isRotate}"></canvas>
        </div>
      </div>
    </div>

    <!-- 2. LOGIN MODAL WITH PASSWORD [6, 10] -->
    <div v-if="showLogin" class="login-modal-overlay">
      <div class="login-card">
        <h2 class="text-2xl font-bold mb-6 text-center">CloudMoon Login</h2>
        <input type="email" v-model="email" placeholder="Email Address" class="login-input">
        <input type="password" v-model="password" placeholder="Password" class="login-input">
        <div class="flex gap-3">
          <button @click="showLogin = false" class="flex-1 py-3 bg-white/5 rounded-xl font-bold">Cancel</button>
          <button @click="handleLogin" class="flex-1 py-3 bg-[#8b5cf6] rounded-xl font-bold">Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_LIST = "https://api.cloudmoon.pro"; // Official Host [11]

    new Vue({
      el: '#app',
      data: {
        isPlaying: false,
        selectedGame: null,
        rawGames: [],
        searchQuery: '',
        showLogin: false,
        email: '',
        password: '',
        token: localStorage.getItem('userToken'),
        // Orientation Settings [3, 12]
        isRotate: true,
        rotation: 1
      },
      computed: {
        filteredGames() {
          return this.rawGames.filter(g => g.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        }
      },
      methods: {
        // Fetches all games and maps icons [13, 14]
        async loadGames() {
          try {
            const res = await axios.get(API_LIST + "/v1/game/list");
            if(res.data.code === 0) {
              this.rawGames = res.data.data.list.map(g => ({
                id: g.pkgName, 
                title: g.title, 
                icon: g.icon, // Maps the game image
                categories: g.categories || ['Cloud']
              }));
            }
          } catch(e) {
            console.error("API Blocked. Showing Demo List.");
            this.rawGames = [
              { id: '1', title: 'Genshin Impact', icon: 'https://cloudmoonapp.com/favicon.ico', categories: ['Action'] },
              { id: '2', title: 'Roblox', icon: 'https://cloudmoonapp.com/favicon.ico', categories: ['Adventure'] }
            ];
          }
        },
        // Restores logic for Email + Password [15]
        async handleLogin() {
          if(!this.email || !this.password) {
            return Swal.fire('Error', 'Email and Password required', 'error');
          }
          // Simulate CloudMoon authentication [16]
          this.token = "cloudmoon_session_" + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('userToken', this.token);
          this.showLogin = false;
          Swal.fire('Success', 'Connected to CloudMoon', 'success');
        },
        signOut() {
          this.token = null;
          localStorage.removeItem('userToken');
          location.reload();
        },
        selectGame(g) { this.selectedGame = g; },
        startGameInAio() {
          if(!this.token) return this.showLogin = true;
          this.isPlaying = true;
          Swal.fire({ title: 'Connecting...', text: 'Initializing Cloud Stream', timer: 2000, showConfirmButton: false });
        }
      },
      mounted() {
        this.loadGames();
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
