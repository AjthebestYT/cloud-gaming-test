<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 1. CUSTOM BRANDING TITLE -->
  <title>ADAN BYPASS | Cloud Gaming</title>
  
  <!-- Essential Libraries from Sources -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@2.4.0/dist/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@0.26.0/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/adapterjs@0.15.5/publish/adapter.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    :root { --bg-main: #1c1c1d; --primary: #8b5cf6; }
    body { background: #000; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
    [v-cloak] { display: none; }
    
    .layout-wrapper { display: flex; width: 100vw; height: 100vh; background: var(--bg-main); position: fixed; top: 0; left: 0; }
    .sidebar-left { width: 380px; flex-shrink: 0; background: #0b0b0b; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; height: 100vh; }
    .main-right { flex: 1; background: #19191a; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    
    /* 2. FORCED HORIZONTAL ROTATION */
    .rotate { transform: rotate(90deg); transform-origin: center; width: 100vh !important; height: 100vw !important; }
    video, canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    
    .game-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .game-item { display: flex; gap: 1rem; padding: 0.5rem; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
    .game-item:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); }
    .game-item img { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; }
    
    .l-rocker { position: absolute; bottom: 20%; left: 20%; width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid white; z-index: 1000; }
  </style>
</head>
<body oncontextmenu="return false;">
  <div id="app" v-cloak>
    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <div class="sidebar-left">
        <div class="p-4 border-b border-white/5 flex flex-col gap-4">
          <div class="flex items-center justify-between">
            <!-- 3. CUSTOM LOGO -->
            <div class="flex items-center gap-2 font-black text-xl">
              <span class="text-white">ADAN</span>
              <span class="text-[#8b5cf6]"> BYPASS</span>
            </div>
            <button v-if="!token" @click="showLogin()" class="px-4 py-1.5 bg-[#8b5cf6] rounded-lg text-xs font-bold">Sign In</button>
            <button v-else @click="signOut()" class="p-2 bg-red-500/10 text-red-500 rounded-lg"><i data-lucide="power" class="w-4 h-4"></i></button>
          </div>
        </div>
        
        <!-- Search and Game List -->
        <div v-show="!selectedGame" class="flex flex-col h-full overflow-hidden">
          <div class="p-4"><input type="text" v-model="searchQuery" placeholder="Search games..." class="w-full bg-[#1c1c1d] border border-white/10 rounded-xl px-4 py-2 text-sm outline-none focus:border-[#8b5cf6]"></div>
          <div class="game-list">
            <!-- Games will show here -->
            <div v-for="g in filteredGames" :key="g.id" class="game-item" @click="selectGame(g)">
              <img :src="g.icon" onerror="this.src='https://cloudmoonapp.com/favicon.ico'">
              <div class="flex flex-col justify-center">
                <h3 class="font-bold text-sm text-white">{{g.title}}</h3>
                <span class="text-xs text-gray-500 uppercase font-bold">{{g.categories.join(' / ')}}</span>
              </div>
            </div>
            <div v-if="filteredGames.length === 0" class="text-center text-gray-500 mt-10">
              {{rawGames.length === 0 ? 'Loading games...' : 'No games found.'}}
            </div>
          </div>
        </div>

        <!-- Selected Game View -->
        <div v-show="selectedGame" class="p-6 flex flex-col h-full">
           <button @click="selectedGame = null" class="mb-4 text-sm text-gray-400">← Back</button>
           <img :src="selectedGame ? selectedGame.icon : ''" class="w-full aspect-video object-cover rounded-xl mb-4">
           <h2 class="text-2xl font-bold mb-4">{{selectedGame ? selectedGame.title : ''}}</h2>
           <button v-if="!isPlaying" @click="startGameInAio" class="w-full py-4 bg-[#8b5cf6] rounded-xl font-bold">START GAME</button>
           <button v-else @click="isPlaying = false" class="w-full py-4 bg-red-500/20 text-red-400 rounded-xl font-bold">EXIT GAME</button>
        </div>
      </div>

      <!-- MAIN PLAYER AREA -->
      <div class="main-right">
        <div v-show="!isPlaying" class="text-white/20 font-black text-6xl tracking-tighter"> ADAN BYPASS </div>
        
        <div v-show="isPlaying" class="w-full h-full relative bg-black">
          <!-- 4. ROTATION APPLIED TO VIDEO -->
          <video ref="remoteVideo" :class="{rotate: isRotate}" autoplay muted playsinline></video>
          <canvas ref="remoteCanvas" :class="{rotate: isRotate}"></canvas>
          
          <div v-if="isMobile()" class="l-rocker"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_LIST = "https://api.cloudmoon.pro";

    new Vue({
      el: '#app',
      data: {
        isPlaying: false,
        selectedGame: null,
        rawGames: [],
        searchQuery: '',
        token: localStorage.getItem('userToken'),
        // 5. DEFAULT HORIZONTAL SETTINGS
        rotation: 1, 
        isRotate: true,
        isRotateScreen: true
      },
      computed: {
        filteredGames() {
          return this.rawGames.filter(g => g.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        }
      },
      methods: {
        async loadGames() {
          try {
            const res = await axios.get(API_LIST + "/v1/game/list");
            if(res.data.code === 0) {
              this.rawGames = res.data.data.list.map(g => ({
                id: g.pkgName, title: g.title, icon: g.icon, categories: g.categories || ['Cloud']
              }));
            }
          } catch(e) { 
            console.error("API Blocked, loading internal demo list.");
            // 6. BACKUP GAMES LIST IF API FAILS
            this.rawGames = [
              {id: '1', title: 'Demo: Genshin Impact', icon: 'https://cloudmoonapp.com/favicon.ico', categories: ['Action']},
              {id: '2', title: 'Demo: Roblox', icon: 'https://cloudmoonapp.com/favicon.ico', categories: ['Adventure']}
            ];
          }
        },
        selectGame(g) { this.selectedGame = g; },
        async startGameInAio() {
          if(!this.token) return this.showLogin();
          this.isPlaying = true;
          Swal.fire({ title: 'Connecting...', text: 'Establishing Cloud Node', timer: 2000, showConfirmButton: false });
        },
        showLogin() {
          Swal.fire({
            title: 'Sign In to ADAN',
            input: 'email',
            inputPlaceholder: 'Enter your email',
            showCancelButton: true,
            confirmButtonText: 'Bypass Sign In',
            confirmButtonColor: '#8b5cf6'
          }).then((result) => {
            if (result.isConfirmed) {
              // 7. FIX: SIMULATE LOGIN SUCCESS
              this.token = "bypass_token_" + Math.random();
              localStorage.setItem('userToken', this.token);
              Swal.fire('Success', 'Logged in as ADAN User', 'success');
            }
          });
        },
        signOut() {
          this.token = null;
          localStorage.removeItem('userToken');
          location.reload();
        },
        isMobile() { return /Mobi|Android|iPhone/i.test(navigator.userAgent); }
      },
      mounted() {
        this.loadGames();
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
