<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ADAN BYPASS | Cloud Gaming</title>
  
  <!-- Essential Libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@0.26.0/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.all.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.min.css" rel="stylesheet">

  <style>
    :root { --bg-main: #1c1c1d; --primary: #8b5cf6; }
    body { background: #000; margin: 0; overflow: hidden; color: white; font-family: sans-serif; }
    [v-cloak] { display: none; }
    
    .layout-wrapper { display: flex; width: 100vw; height: 100vh; background: var(--bg-main); position: fixed; }
    
    /* 1. CLOSABLE SIDEBAR CSS */
    .sidebar-left { 
      width: 380px; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: #0b0b0b; 
      border-right: 1px solid rgba(255,255,255,0.05); 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      z-index: 50;
    }
    .sidebar-closed { transform: translateX(-380px); width: 0; }
    
    .main-right { flex: 1; background: #19191a; position: relative; display: flex; flex-direction: column; overflow: hidden; }

    /* 2. HORIZONTAL GAME LIST CSS */
    .game-list-container { width: 100%; padding: 2rem; overflow-x: auto; white-space: nowrap; }
    .game-list-horizontal { display: flex; flex-direction: row; gap: 1.5rem; padding-bottom: 1rem; }
    .game-card { 
      flex: 0 0 240px; 
      background: rgba(255,255,255,0.03); 
      border-radius: 20px; 
      overflow: hidden; 
      cursor: pointer; 
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .game-card:hover { transform: translateY(-10px); border-color: var(--primary); background: rgba(139, 92, 246, 0.1); }
    .game-card img { width: 100%; height: 135px; object-fit: cover; }
    
    .rotate { transform: rotate(90deg); transform-origin: center; width: 100vh !important; height: 100vw !important; }
    video, canvas { width: 100%; height: 100%; position: absolute; }

    .toggle-btn { position: absolute; top: 20px; left: 20px; z-index: 100; background: var(--primary); padding: 10px; border-radius: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <!-- Toggle Button for Closable Sidebar -->
    <div class="toggle-btn" @click="isSidebarOpen = !isSidebarOpen">
      <i :data-lucide="isSidebarOpen ? 'chevron-left' : 'menu'" class="text-white w-6 h-6"></i>
    </div>

    <div class="layout-wrapper">
      <!-- SIDEBAR (CLOSABLE) -->
      <div class="sidebar-left" :class="{'sidebar-closed': !isSidebarOpen}">
        <div class="p-8 border-b border-white/5 pt-20">
          <div class="flex items-center justify-between">
            <div class="font-black text-2xl tracking-tighter">
              <span class="text-white">ADAN</span><span class="text-[#8b5cf6]"> BYPASS</span>
            </div>
            <button v-if="!token" @click="showLoginModal = true" class="px-4 py-2 bg-[#8b5cf6] rounded-xl text-xs font-bold">Sign In</button>
            <button v-else @click="signOut()" class="p-2 bg-red-500/10 text-red-500 rounded-lg"><i data-lucide="power" class="w-4 h-4"></i></button>
          </div>
        </div>
        
        <!-- Game Details in Sidebar when selected -->
        <div v-if="selectedGame" class="p-8 flex flex-col h-full overflow-y-auto">
           <button @click="selectedGame = null" class="mb-4 text-gray-500 flex items-center gap-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
           <img :src="selectedGame.icon" class="w-full aspect-video object-cover rounded-2xl mb-6">
           <h2 class="text-3xl font-black mb-4">{{selectedGame.title}}</h2>
           <p class="text-sm text-gray-400 mb-8">Ready to stream on ADAN Bypass Cloud.</p>
           <button @click="startGame" class="w-full py-4 bg-[#8b5cf6] rounded-2xl font-black text-lg">START SESSION</button>
        </div>
        <div v-else class="p-8 text-gray-500 italic">Select a game from the horizontal list to view details.</div>
      </div>

      <!-- MAIN AREA -->
      <div class="main-right">
        <!-- 3. HORIZONTAL GAME LIST -->
        <div v-if="!isPlaying" class="flex-1 flex flex-col justify-center">
          <div class="px-12 mb-4 flex justify-between items-center">
             <h2 class="text-4xl font-black">POPULAR GAMES</h2>
             <div class="bg-white/5 px-4 py-2 rounded-xl border border-white/10">
               <input v-model="searchQuery" placeholder="Search..." class="bg-transparent outline-none text-sm w-48">
             </div>
          </div>
          
          <div class="game-list-container no-scrollbar">
            <div class="game-list-horizontal">
              <div v-for="g in filteredGames" :key="g.id" class="game-card" @click="selectGame(g)">
                <img :src="g.icon" onerror="this.src='https://cloudmoonapp.com/favicon.ico'">
                <div class="p-4">
                  <div class="font-bold text-white mb-1">{{g.title}}</div>
                  <div class="text-[10px] text-purple-400 font-black uppercase">{{g.category}}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- PLAYER AREA -->
        <div v-if="isPlaying" class="w-full h-full relative bg-black">
          <video ref="remoteVideo" :class="{rotate: true}" autoplay muted playsinline></video>
          <canvas ref="remoteCanvas" :class="{rotate: true}"></canvas>
          <button @click="isPlaying = false" class="absolute top-4 right-4 z-[1] px-6 py-2 bg-red-500 rounded-xl font-bold">CLOSE</button>
        </div>
      </div>
    </div>

    <!-- 4. STRICT LOGIN MODAL -->
    <div v-if="showLoginModal" class="fixed inset-0 z- flex items-center justify-center bg-black/90 backdrop-blur-xl">
      <div class="bg-[#0b0b0b] p-10 rounded-[40px] w-full max-w-sm border border-white/10 shadow-2xl">
        <h2 class="text-3xl font-black mb-2">CloudMoon</h2>
        <p class="text-gray-500 text-sm mb-8">Enter your official credentials.</p>
        
        <input type="email" v-model="loginEmail" placeholder="Email Address" class="w-full bg-[#1c1c1d] border border-white/10 rounded-2xl px-6 py-4 mb-4 outline-none focus:border-[#8b5cf6] transition">
        <input type="password" v-model="loginPass" placeholder="Password" class="w-full bg-[#1c1c1d] border border-white/10 rounded-2xl px-6 py-4 mb-8 outline-none focus:border-[#8b5cf6] transition">
        
        <div class="flex gap-4">
          <button @click="showLoginModal = false" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold">Cancel</button>
          <button @click="handleStrictLogin" class="flex-1 py-4 bg-[#8b5cf6] rounded-2xl font-bold shadow-lg shadow-purple-500/20">Sign In</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        isSidebarOpen: true,
        isPlaying: false,
        selectedGame: null,
        showLoginModal: false,
        loginEmail: '',
        loginPass: '',
        searchQuery: '',
        token: localStorage.getItem('userToken'),
        // 5. ADDED GAMES LIST
        rawGames: [
          { id: 1, title: 'Genshin Impact', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_pQ_xXo6jXvW2g7Zz0L1_uP8lR9a1m7f0aQ&s', category: 'Action/RPG' },
          { id: 2, title: 'Roblox', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-mI6gG7K_ZJ9LpUq5-V5w2O7k0e1wzL-XQ&s', category: 'Adventure' },
          { id: 3, title: 'Free Fire', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz6-v0V9Zz_fQ4w7kL-G2xZ9w0o9e8v7p6aQ&s', category: 'Battle Royale' },
          { id: 4, title: 'Minecraft', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_v4y6x8p7L_fQ2z0w9e8v7p6aQ&s', category: 'Simulation' },
          { id: 5, title: 'Mobile Legends', icon: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz6-v0V9Zz_fQ4w7kL-G2xZ9w0o9e8v7p6aQ&s', category: 'MOBA' }
        ]
      },
      computed: {
        filteredGames() {
          return this.rawGames.filter(g => g.title.toLowerCase().includes(this.searchQuery.toLowerCase()));
        }
      },
      methods: {
        selectGame(g) { this.selectedGame = g; this.isSidebarOpen = true; },
        // 6. STRICT LOGIN VALIDATION
        handleStrictLogin() {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(this.loginEmail)) {
            return Swal.fire('Invalid Email', 'Please enter a valid email address (e.g. name@example.com)', 'error');
          }
          if (this.loginPass.length < 6) {
            return Swal.fire('Weak Password', 'Password must be at least 6 characters long', 'error');
          }
          
          // Successful validation
          this.token = "session_" + Math.random();
          localStorage.setItem('userToken', this.token);
          this.showLoginModal = false;
          Swal.fire({ icon: 'success', title: 'Connected to CloudMoon', timer: 1500, showConfirmButton: false });
        },
        startGame() {
          if(!this.token) return this.showLoginModal = true;
          this.isPlaying = true;
          Swal.fire({ title: 'Connecting...', text: 'Connecting to ADAN Cloud Node', timer: 2000, showConfirmButton: false });
        },
        signOut() {
          this.token = null;
          localStorage.removeItem('userToken');
          location.reload();
        }
      },
      mounted() { lucide.createIcons(); }
    });
  </script>
</body>
</html>
